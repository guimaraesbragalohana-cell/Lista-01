<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descobrir hipotenusa</title>
</head>

<body style="background-color: rgb(201, 227, 241);">

    <h1>Descobrir hipotenúsa</h1>
    <label for="inputA">Digite o cateto 1</label>
    <input type="number" name="inputA" id="inputA">
    <br>
    <label for="inputB">Digite o cateto 2</label>
    <input type="number" name="inputB" id="inputB">
    <br>
    <input type="button" name="calcular hipotenusa" id="calcular hipotenusa" value="Calcular" 
    onclick="funcaoCalcular()"> 
    <br>
    <br>
    <span id="resultado" style="border: 1px solid black; padding: 5px;">0</span>

    <script>
        function funcaoCalcular() {
            
            let Ca = parseFloat(document.getElementById("inputA").value);
            let Cb = parseFloat(document.getElementById("inputB").value);

            let h = Math.sqrt(Ca**2 + Cb**2)

            document.getElementById("resultado").innerHTML = h;

        }


    </script>
</body>

</html>
