<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meia-cola</title>
</head>

<body style="background-color: rgb(201, 227, 241);">

    <h1>Quantidade de litros comprados</h1>
    <label for="limão">Refri de limão - 350ml</label>
    <input type="number" name="limão" id="limão">
    <br>
    <label for="morango">Refri de morango - 600ml</label>
    <input type="number" name="morango" id="morango">
    <br>
    <label for="uva">Refri de uva - 2000ml</label>
    <input type="number" name="uva" id="uva">
    <br>
    <br>
    <input type="button" name="calcular litros" id="calcular litros" value="Calcular" onclick="funcaoCalcular()"> 
    <br>
    <br>
    <span id="resultado" style="border: 1px solid black; padding: 5px;">0</span>

    <script>
        function funcaoCalcular() {
            
            let L = parseFloat(document.getElementById("limão").value);
            let M = parseFloat(document.getElementById("morango").value);
            let U = parseFloat(document.getElementById("uva").value);

            let refri1 = L*350
            let refri2 = M*600
            let refri3 = U*2000
            let converter = (refri1+refri2+refri3)/1000

            document.getElementById("resultado").innerHTML = converter;

        }

    </script>
</body>

</html>
